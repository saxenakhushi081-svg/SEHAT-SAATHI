<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Symptoms - Sehat Saathi</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <style>
        .container { max-width: 600px; margin: 60px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #1e3a8a; border-left: 5px solid #2563eb; padding-left: 15px; }
        textarea { width: 100%; height: 150px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin: 20px 0; font-size: 1rem; }
        .upload-box { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; color: #64748b; }
        .submit-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Describe Symptoms</h2>
        <p>Explain how you feel. Our AI will analyze your description to find the right specialist.</p>
        <textarea id="symptomInput" placeholder="E.g., I have a persistent headache and blurry vision for two days..."></textarea>
        
        <div class="upload-box" onclick="alert('File scanner active! Select your prescription.')">
            <span>📄 Upload Medical History (Optional)</span>
        </div>

        <button class="submit-btn" onclick="saveAndAnalyze()">Generate AI Report</button>
    </div>

    <script>
        function saveAndAnalyze() {
            const text = document.getElementById('symptomInput').value;
            if(!text) return alert("Please describe your symptoms first!");
            localStorage.setItem('userSymptoms', text);
            window.location.href = '/'; // Redirect to index.html (Results)
        }
    </script>
</body>
</html>
